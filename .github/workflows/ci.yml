name: CI

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint


  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test


  packaging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Verify ESM imports
        run: |
          node -e "
          import { readFileSync } from 'fs';
          const pkg = JSON.parse(readFileSync('./package.json', 'utf8'));
          for (const [entry, paths] of Object.entries(pkg.exports)) {
            const esmPath = paths.import;
            const mod = await import(esmPath);
            const keys = Object.keys(mod);
            if (keys.length === 0) throw new Error('No exports found in ' + esmPath);
            console.log('ESM ' + entry + ': ' + keys.length + ' exports (' + keys.join(', ') + ')');
          }
          "

      - name: Verify CJS imports
        run: |
          node --input-type=commonjs -e "
          const { readFileSync } = require('fs');
          const pkg = JSON.parse(readFileSync('./package.json', 'utf8'));
          for (const [entry, paths] of Object.entries(pkg.exports)) {
            const cjsPath = paths.require;
            const mod = require(cjsPath);
            const keys = Object.keys(mod);
            if (keys.length === 0) throw new Error('No exports found in ' + cjsPath);
            console.log('CJS ' + entry + ': ' + keys.length + ' exports (' + keys.join(', ') + ')');
          }
          "
