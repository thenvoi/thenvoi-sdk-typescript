name: CI

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint


  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test


  packaging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Verify ESM imports
        run: |
          node -e "
          async function main() {
            const sdk = await import('./dist/index.js');
            const { Agent, ThenvoiLink, AgentRuntime, PlatformRuntime, loadAgentConfig } = sdk;
            console.log('ESM core imports successful');

            const adapters = await import('./dist/adapters.js');
            const { GenericAdapter, OpenAIAdapter, AnthropicAdapter, GeminiAdapter, LangGraphAdapter, A2AAdapter, A2AGatewayAdapter, ParlantAdapter, ClaudeSDKAdapter, CodexAdapter } = adapters;
            console.log('ESM adapter imports successful');
          }
          main();
          "

      - name: Verify CJS imports
        run: |
          node --input-type=commonjs -e "
          const sdk = require('./dist/index.cjs');
          const { Agent, ThenvoiLink, AgentRuntime, PlatformRuntime, loadAgentConfig } = sdk;
          console.log('CJS core imports successful');

          const adapters = require('./dist/adapters.cjs');
          const { GenericAdapter, OpenAIAdapter, AnthropicAdapter, GeminiAdapter, LangGraphAdapter, A2AAdapter, A2AGatewayAdapter, ParlantAdapter, ClaudeSDKAdapter, CodexAdapter } = adapters;
          console.log('CJS adapter imports successful');
          "
