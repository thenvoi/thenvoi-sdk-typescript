name: CI

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # Detect which packages changed to skip unnecessary builds
  changes:
    runs-on: ubuntu-latest
    outputs:
      sdk: ${{ steps.filter.outputs.sdk }}
      openclaw: ${{ steps.filter.outputs.openclaw }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sdk:
              - 'packages/sdk/**'
              - 'pnpm-lock.yaml'
            openclaw:
              - 'packages/openclaw/**'
              - 'packages/sdk/**'
              - 'pnpm-lock.yaml'

  lint:
    needs: changes
    if: needs.changes.outputs.sdk == 'true' || needs.changes.outputs.openclaw == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        if: needs.changes.outputs.sdk == 'true' || needs.changes.outputs.openclaw == 'true'
        run: pnpm --filter @thenvoi/sdk build

      - name: Build OpenClaw
        if: needs.changes.outputs.openclaw == 'true'
        run: pnpm --filter @thenvoi/openclaw-channel-thenvoi build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  test:
    needs: changes
    if: needs.changes.outputs.sdk == 'true' || needs.changes.outputs.openclaw == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        if: needs.changes.outputs.sdk == 'true' || needs.changes.outputs.openclaw == 'true'
        run: pnpm --filter @thenvoi/sdk build

      - name: Build OpenClaw
        if: needs.changes.outputs.openclaw == 'true'
        run: pnpm --filter @thenvoi/openclaw-channel-thenvoi build

      - name: Run tests
        run: pnpm test

  packaging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Verify SDK ESM imports
        working-directory: packages/sdk
        run: |
          node --input-type=module -e "
          import { readFileSync } from 'fs';
          import { resolve } from 'path';
          import { pathToFileURL } from 'url';
          const pkg = JSON.parse(readFileSync('./package.json', 'utf8'));
          for (const [entry, paths] of Object.entries(pkg.exports)) {
            const esmPath = paths.import;
            const abs = pathToFileURL(resolve(esmPath));
            const mod = await import(abs);
            const keys = Object.keys(mod);
            if (keys.length === 0) throw new Error('No exports found in ' + esmPath);
            console.log('ESM ' + entry + ': ' + keys.length + ' exports (' + keys.join(', ') + ')');
          }
          "

      - name: Verify SDK CJS imports
        working-directory: packages/sdk
        run: |
          node -e "
          const { readFileSync } = require('fs');
          const { resolve } = require('path');
          const pkg = JSON.parse(readFileSync('./package.json', 'utf8'));
          for (const [entry, paths] of Object.entries(pkg.exports)) {
            const cjsPath = paths.require;
            const mod = require(resolve(cjsPath));
            const keys = Object.keys(mod);
            if (keys.length === 0) throw new Error('No exports found in ' + cjsPath);
            console.log('CJS ' + entry + ': ' + keys.length + ' exports (' + keys.join(', ') + ')');
          }
          "

      - name: Verify OpenClaw build artifacts
        working-directory: packages/openclaw
        run: |
          node -e "
          const fs = require('fs');
          // Verify dist files exist
          const required = ['dist/index.js', 'dist/index.d.ts', 'dist/openclaw.plugin.json'];
          for (const f of required) {
            if (!fs.existsSync(f)) throw new Error('Missing: ' + f);
            const stat = fs.statSync(f);
            if (stat.size === 0) throw new Error('Empty file: ' + f);
            console.log(f + ': ' + (stat.size / 1024).toFixed(1) + ' KB');
          }
          // Verify .d.ts has expected exports
          const dts = fs.readFileSync('dist/index.d.ts', 'utf8');
          const expectedExports = ['thenvoiChannel', 'registerChannel', 'mcpTools', 'BASE_INSTRUCTIONS', 'buildSystemPrompt'];
          for (const exp of expectedExports) {
            if (!dts.includes(exp)) throw new Error('Missing export in .d.ts: ' + exp);
          }
          console.log('OpenClaw: ' + expectedExports.length + ' key exports verified in .d.ts');
          "
