name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    concurrency: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App Token
        id: app_token_generator
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Release Please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app_token_generator.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

      - name: Install pnpm
        if: steps.release.outputs.release_created == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.release.outputs.release_created == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.release.outputs.release_created == 'true'
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        if: steps.release.outputs.release_created == 'true'
        run: pnpm typecheck

      - name: Lint
        if: steps.release.outputs.release_created == 'true'
        run: pnpm lint

      - name: Run tests
        if: steps.release.outputs.release_created == 'true'
        run: pnpm test

      - name: Build package
        if: steps.release.outputs.release_created == 'true'
        run: pnpm build

      - name: Publish to npm
        if: steps.release.outputs.release_created == 'true'
        run: pnpm publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish release summary
        if: steps.release.outputs.release_created == 'true'
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.release.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
